[mypy]
python_version = 3.13
plugins = pydantic.mypy
ignore_missing_imports = True
warn_unused_ignores = True
exclude = (^\.venv/|/__pycache__/)

# cv2, torch and torchvision ship incomplete type stubs; their interface-level
# noise is silenced per-module while our own code stays checked.
[mypy-cv2.*]
ignore_errors = True
